name: Keep Render Servers Alive

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Services
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
          MCP_URL: ${{ secrets.RENDER_MCP_URL }}

        run: |
          URLS=(
            "$BACKEND_URL"
            "$MCP_URL"
            "$FRONTEND_URL"
            "$ADMIN_URL"
          )

          for URL in "${URLS[@]}"; do
            if [ -z "$URL" ]; then
              echo "Skipping empty URL"
              continue
            fi

            echo "Pinging $URL/health"
            curl -sSf "$URL/health" > /dev/null || echo "Ping to $URL failed, continuing"
          done