services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: armoriq-backend
    ports:
      - "3001:3001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped
    depends_on:
      - mcp-server

  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    container_name: armoriq-mcp
    ports:
      - "3002:3002"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - PORT=3002
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: armoriq-frontend
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:3000
    restart: unless-stopped
    depends_on:
      - backend
